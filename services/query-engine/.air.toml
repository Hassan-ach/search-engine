root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/main"
  cmd = "templ generate && go build -o ./tmp/main ./cmd/server/"
  include_ext = ["go", "tpl", "tmpl", "templ", "html"]
  exclude_dir = ["vendor", "tmp", "node_modules", "public", "static", "bin"]
  exclude_unchanged = true
  follow_symlinks = false
  send_interrupt = false
  stop_on_error = true
  delay = 500

# [misc]
#   clean_on_exit = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false
