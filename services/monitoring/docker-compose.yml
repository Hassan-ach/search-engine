# ── Boogle Monitoring — Docker Compose deployment ─────────────────────────────
#
# NOTE: The recommended way to run monitoring is directly on the host:
#   cd services/monitoring && npm start
#
# Use this file when a containerised deployment is preferred.
#
# ── Prerequisites ─────────────────────────────────────────────────────────────
#
# 1. Export BOOGLE_PROJECT_ROOT to the absolute path of the project root.
#    The container mounts the project at this SAME path so that `docker compose`
#    can resolve build contexts relative to each service's compose file:
#
#      export BOOGLE_PROJECT_ROOT=$(git rev-parse --show-toplevel)
#
# 2. Make sure /var/run/docker.sock is accessible (standard on Linux).
#
# 3. Copy .env.example → .env and fill in DATABASE_URL, REDIS_URL, passwords.
#    The compose-file path variables are automatically overridden below, so you
#    can leave them as-is in .env (or remove them).
#
# ── Then run ──────────────────────────────────────────────────────────────────
#
#   docker compose up -d
#   docker compose logs -f monitoring
#
# ── Security notes ────────────────────────────────────────────────────────────
#
# * Mounting /var/run/docker.sock gives the container full control over the host
#   Docker daemon. Do not expose MONITOR_PORT (7070) to public networks.
# * The project root is mounted read-only (:ro). Build contexts are not written
#   back to the mounted tree; docker daemon accesses them from the host directly.
# ──────────────────────────────────────────────────────────────────────────────

services:
  monitoring:
    build: .
    container_name: monitoring
    restart: unless-stopped

    # Host networking so that localhost:{5432,6379,1323} in .env reach the
    # same host-level ports used by PostgreSQL, Redis, and the Engine container.
    network_mode: "host"

    volumes:
      # ── Docker access ──────────────────────────────────────────────────────
      # Required: the monitor shells out to `docker compose` via the host daemon.
      - /var/run/docker.sock:/var/run/docker.sock

      # Optional: Docker credential store (private image pulls).
      - ${DOCKER_CONFIG:-/root/.docker}:/root/.docker:ro

      # ── Project root ───────────────────────────────────────────────────────
      # Mount at the IDENTICAL absolute path so that `docker compose -f <file>`
      # resolves build contexts the same way as on the host.
      # BOOGLE_PROJECT_ROOT must be set (see Prerequisites above).
      - ${BOOGLE_PROJECT_ROOT:?set BOOGLE_PROJECT_ROOT to the absolute project root path}:${BOOGLE_PROJECT_ROOT}:ro

      # ── Persistent logs ────────────────────────────────────────────────────
      - ./logs:/app/logs

    env_file:
      - .env

    environment:
      # Override compose-file paths to absolute paths inside the container.
      # These paths mirror the BOOGLE_PROJECT_ROOT mount above.
      ROOT_COMPOSE_FILE:    ${BOOGLE_PROJECT_ROOT}/docker-compose.yml
      ENGINE_COMPOSE_FILE:  ${BOOGLE_PROJECT_ROOT}/services/engine/docker-compose.yml
      SPIDER_COMPOSE_FILE:  ${BOOGLE_PROJECT_ROOT}/services/spider/docker-compose.yml
      INDEXER_COMPOSE_FILE: ${BOOGLE_PROJECT_ROOT}/services/indexer/docker-compose.yml
      RANKING_COMPOSE_FILE: ${BOOGLE_PROJECT_ROOT}/services/ranking/docker-compose.yml

      # Log to /app/logs (mapped to ./logs on the host via the volume above).
      LOG_PATH: logs/monitor.log
