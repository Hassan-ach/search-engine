services:
  psql:
    image: postgres
    container_name: psql
    volumes:
      - ./migration:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DBNAME}
    ports:
      - "${PG_PORT}:5432"
    networks:
      - search_net
  redis:
    image: redis
    container_name: redis
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - search_net
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    networks:
      - search_net
networks:
  search_net:
    external: true
